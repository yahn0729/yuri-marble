<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yuri Marble 💗</title>
 <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB-ZXl5RpgKzbickK0VJrFFY1YJ0U3qp0A",
    authDomain: "yuri-marble.firebaseapp.com",
    projectId: "yuri-marble",
    storageBucket: "yuri-marble.firebasestorage.app",
    messagingSenderId: "520132626186",
    appId: "1:520132626186:web:9997ba54d5c0364a799cf3"
  };

  async function main() {
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    await signInAnonymously(auth);

    // 보드 그리기
    const boardEl = document.getElementById("board");
    boardEl.innerHTML = "";
    
const tiles = {
  0: { name: "출발 💗", amount: "+20" },
  1: { name: "스위스 🇨🇭", amount: "10" },
  2: { name: "황금열쇠 🔑", amount: "" },
  3: { name: "프랑스 🇫🇷", amount: "20" },
  4: { name: "무인도 🏝", amount: "1턴 정지" },
  5: { name: "일본 🇯🇵", amount: "30" },
  6: { name: "황금열쇠 🔑", amount: "" },
  7: { name: "미국 🇺🇸", amount: "40" },
  8: { name: "사회복지기금 💰", amount: "모인 금액 수령" },
  9: { name: "독일 🇩🇪", amount: "50" },
 10: { name: "황금열쇠 🔑", amount: "" },
 11: { name: "태국 🇹🇭", amount: "60" },
 12: { name: "우주여행 🚀", amount: "랜덤 이동" },
 13: { name: "영국 🇬🇧", amount: "70" },
 14: { name: "사회복지기금 접수처 🧾", amount: "-10 기부" },
 15: { name: "서울 🇰🇷", amount: "80" }
};
    
    const layout = [
      0, 1, 2, 3, 4,
      15, null, null, null, 5,
      14, null, null, null, 6,
      13, null, null, null, 7,
      12, 11, 10, 9, 8
    ];

layout.forEach((num) => {
  const cell = document.createElement("div");

  if (num === null) {
    cell.className = "empty";
    cell.innerHTML = "&nbsp;";
  } else {
    cell.className = "cell";

    const t = tiles[num];

    cell.innerHTML = `
      <div class="tileName">${t?.name ?? num}</div>
      <div class="tileAmt">${t?.amount ?? ""}</div>
    `;
  }

  boardEl.appendChild(cell);
});

    // 실시간 데이터
    const gameRef = doc(db, "games", "room1");
    await setDoc(gameRef, { position1: 0, position2: 0 }, { merge: true });

    onSnapshot(gameRef, (snap) => {
      const data = snap.data() || {};
      document.getElementById("p1").textContent = String(data.position1 ?? 0);
      document.getElementById("p2").textContent = String(data.position2 ?? 0);
    });
  }

  // 모바일에서 DOM 준비 보장
  window.addEventListener("DOMContentLoaded", () => {
    main().catch((e) => {
      console.error(e);
      document.body.insertAdjacentHTML(
        "beforeend",
        `<p style="color:#b00020;font-weight:700">에러: ${String(e.message || e)}</p>`
      );
    });
  });
</script>

  <style>
    body { background: #ffe6f2; font-family: sans-serif; text-align: center; }
    #board { 
      display: grid; 
      grid-template-columns: repeat(5, 60px); 
      gap: 5px; 
      justify-content: center; 
      margin-top: 20px;
    }
    .cell { 
      background: white; 
      border-radius: 10px; 
      padding: 20px; 
    }
.empty {
  background: transparent;
  border: none;
    padding: 20px; /* .cell이랑 동일하게 */
}
.tileName {
  font-weight: 800;
  font-size: 12px;
}
.tileAmt {
  margin-top: 6px;
  font-size: 11px;
  opacity: 0.8;
}    

  </style>
</head>
<body>
  <h1>Yuri Marble 💗</h1>
  <div id="board"></div>
  <p>Player1 위치: <span id="p1">0</span></p>
  <p>Player2 위치: <span id="p2">0</span></p>
</body>
</html>
