      // 게임 상태/로컬 변수
      const gameRef = doc(db, "games", "room1");

   async function claimSeat() {
  await runTransaction(db, async (tx) => {
    const snap = await tx.get(gameRef);
    const data = snap.data() || {};
    const now = Date.now();

    const p1 = data.player1Id ?? null;
    const p2 = data.player2Id ?? null;
    const p1Seen = data.p1LastSeen ?? 0;
    const p2Seen = data.p2LastSeen ?? 0;

    const p1Alive = p1 && (now - p1Seen) < SEAT_TIMEOUT_MS;
    const p2Alive = p2 && (now - p2Seen) < SEAT_TIMEOUT_MS;

    // 내가 이미 자리면 lastSeen만 갱신
    if (p1 === clientId) {
      tx.set(gameRef, { p1LastSeen: now }, { merge: true });
      return;
    }
    if (p2 === clientId) {
      tx.set(gameRef, { p2LastSeen: now }, { merge: true });
      return;
    }

    // 1P가 비었거나 죽었으면 내가 1P
    if (!p1 || !p1Alive) {
      tx.set(gameRef, { player1Id: clientId, p1LastSeen: now }, { merge: true });
      return;
    }

    // 2P가 비었거나 죽었으면 내가 2P
    if (!p2 || !p2Alive) {
      tx.set(gameRef, { player2Id: clientId, p2LastSeen: now }, { merge: true });
      return;
    }

    // 둘 다 살아있으면 관전(아무것도 안 함)
  });
}

function mod16(n){ return (n % 16 + 16) % 16; }

    /**
 * 이동(from -> to) + 출발점 보너스(+20) 처리 + 도착칸 판정(applyLanding)까지 한번에
 * - awardOnPassStart: 출발점을 "지나가면" +20 (ex: 12 -> 3)
 * - awardOnLandStart: 출발(0)에 "도착하면" +20 (ex: 12 -> 0)
 * 
 */
function moveAndResolve(tx, data, myPlayer, fromPos, toPos, opts = {}) {
  const awardOnPassStart = (opts.awardOnPassStart !== false); // 기본 true
  const awardOnLandStart = (opts.awardOnLandStart !== false); // 기본 true

  let m1 = data.money1 ?? 200;
  let m2 = data.money2 ?? 200;

  const from = Number(fromPos ?? 0);
  const to = mod16(Number(toPos ?? 0));

  // "전진 이동" 기준으로 한 바퀴 넘어가면 출발점 통과로 간주
  // (우주여행 룰을 'from에서 to로 앞으로 간다'로 정했기 때문에 안전하게 일관됨)
  const passedStart = to < from;

  if ((awardOnPassStart && passedStart) || (awardOnLandStart && to === 0)) {
    if (myPlayer === 1) m1 += 20;
    else m2 += 20;
  }

const dir = opts.dir || "forward";

applyLanding(tx, {
  ...data,
  money1: m1,
  money2: m2
}, myPlayer, to, {
  pending: null,
  lastMove: {
    player: myPlayer,
    from,
    to,
    dir,
    at: Date.now()
  }
});
}
      
function applyLanding(tx, data, myPlayer, nextPos, extraPatch = {}) {
  const tilesLocal = tiles; // 가독성
  const t = tilesLocal[nextPos];
  const ownedNow = data.owned || {};
  const buildingsNow = data.buildings || {};

  let m1 = data.money1 ?? 200;
  let m2 = data.money2 ?? 200;
  let fundNow = data.fund ?? 0;
  let j1 = data.jail1 ?? 0;
  let j2 = data.jail2 ?? 0;

  const movePatch = (myPlayer === 1) ? { position1: nextPos } : { position2: nextPos };

  // 14) 기금 납부
  if (nextPos === 14) {
    const fee = 10;
    if (myPlayer === 1) m1 -= fee; else m2 -= fee;
    fundNow += fee;
    if (m1 < 0) m1 = 0;
    if (m2 < 0) m2 = 0;

    tx.set(gameRef, {
      ...movePatch,
      ...extraPatch,
      money1: m1, money2: m2,
      fund: fundNow,
      owned: ownedNow,
      buildings: buildingsNow,
      pending: null,
      turn: (myPlayer === 1 ? 2 : 1)
    }, { merge: true });
    return;
  }

  // 8) 기금 수령
  if (nextPos === 8) {
    if (fundNow <= 0) {
      tx.set(gameRef, {
        ...movePatch,
        ...extraPatch,
        money1: m1, money2: m2,
        fund: fundNow,
        owned: ownedNow,
        buildings: buildingsNow,
        pending: null,
        turn: (myPlayer === 1 ? 2 : 1)
      }, { merge: true });
      return;
    }

    tx.set(gameRef, {
      ...movePatch,
      ...extraPatch,
      money1: m1, money2: m2,
      fund: fundNow,
      owned: ownedNow,
      buildings: buildingsNow,
      pending: { type: "fund", player: myPlayer, amount: fundNow }
      // turn 넘기지 않음 (확인 버튼에서 넘김)
    }, { merge: true });
    return;
  }

  // 4) 무인도
  if (nextPos === 4) {
    const patchJail = (myPlayer === 1) ? { jail1: 2 } : { jail2: 2 };
    tx.set(gameRef, {
      ...movePatch,
      ...extraPatch,

        }

  }
}

  }, { merge: true });

 document.getElementById("playerLabel").textContent =

else currentPos2 = newP2;
