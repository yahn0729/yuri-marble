<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yuri Marble 💗</title>
 <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB-ZXl5RpgKzbickK0VJrFFY1YJ0U3qp0A",
    authDomain: "yuri-marble.firebaseapp.com",
    projectId: "yuri-marble",
    storageBucket: "yuri-marble.firebasestorage.app",
    messagingSenderId: "520132626186",
    appId: "1:520132626186:web:9997ba54d5c0364a799cf3"
  };

  async function main() {
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    await signInAnonymously(auth);

  const uid = auth.currentUser.uid;
let myPlayer = null;

async function assignPlayer(gameRef) {
  const saved = localStorage.getItem("yuriMarblePlayer");
  if (saved === "1" || saved === "2") {
    myPlayer = Number(saved);
    return;
  }

  await runTransaction(db, async (tx) => {
    const snap = await tx.get(gameRef);
    const data = snap.exists() ? snap.data() : {};

    const seat1 = data.seat1 ?? null;
    const seat2 = data.seat2 ?? null;

    if (seat1 === uid) myPlayer = 1;
    else if (seat2 === uid) myPlayer = 2;
    else if (!seat1) { myPlayer = 1; tx.set(gameRef, { seat1: uid }, { merge: true }); }
    else if (!seat2) { myPlayer = 2; tx.set(gameRef, { seat2: uid }, { merge: true }); }
    else myPlayer = null;
  });

  if (myPlayer) localStorage.setItem("yuriMarblePlayer", String(myPlayer));
}
    
  let currentPos = 0;
  let currentPos2 = 0;

 let latestTurn = 1;   

    // 보드 그리기
    const boardEl = document.getElementById("board");
    boardEl.innerHTML = "";
    
const tiles = {
  0: { name: "출발 💗", amount: "+20" },
  1: { name: "스위스 ❄️", amount: "10" },
  2: { name: "황금열쇠 🔑", amount: "" },
  3: { name: "프랑스 🥐", amount: "20" },
  4: { name: "무인도 🏝", amount: "2턴 정지" },
  5: { name: "일본 🗾", amount: "30" },
  6: { name: "황금열쇠 🔑", amount: "" },
  7: { name: "미국 🗽", amount: "40" },
  8: { name: "사회복지기금 💰", amount: "모인 금액 수령" },
  9: { name: "독일 🍺", amount: "50" },
 10: { name: "황금열쇠 🔑", amount: "" },
 11: { name: "태국 🌴", amount: "60" },
 12: { name: "우주여행 🚀", amount: "랜덤 이동" },
 13: { name: "영국 ☕", amount: "70" },
 14: { name: "사회복지기금 접수처 🧾", amount: "-10 기부" },
 15: { name: "서울 🏙", amount: "80" }
};
    
const layout = [
  8,  9, 10, 11, 12,
  7, null, null, null, 13,
  6, null, null, null, 14,
  5, null, null, null, 15,
  4,  3,  2,  1,  0
];

layout.forEach((num) => {
  const cell = document.createElement("div");

  if (num === null) {
    cell.className = "empty";
    cell.innerHTML = "&nbsp;";
} else {
  cell.className = "cell";
  cell.id = `tile-${num}`;  

  if ([0,4,8,12].includes(num)) {
    cell.classList.add("corner");
  }

  const t = tiles[num];
  cell.innerHTML = `
   <div class="tokens"></div>
    <div class="tileName">${t?.name ?? num}</div>
    <div class="tileAmt">${t?.amount ?? ""}</div>
  `;
}

  boardEl.appendChild(cell);
});

    // 실시간 데이터
    const gameRef = doc(db, "games", "room1");
await setDoc(gameRef, { position1: 0, position2: 0 }, { merge: true });
    
await runTransaction(db, async (tx) => {
  const snap = await tx.get(gameRef);
  const data = snap.data() || {};
  if (data.turn == null) {
    tx.set(gameRef, { turn: 1 }, { merge: true });
  }
});  
    
await assignPlayer(gameRef);


const label = document.getElementById("playerLabel");
if (myPlayer === 1) label.textContent = "당신은 Player 1 🐶";
else if (myPlayer === 2) label.textContent = "당신은 Player 2 😎";
else label.textContent = "관전 모드 👀";
    
onSnapshot(gameRef, (snap) => {
  const data = snap.data() || {};
  currentPos  = data.position1 ?? 0;
  currentPos2 = data.position2 ?? 0;
  renderTokens(currentPos, currentPos2);

   const turn = data.turn ?? 1;
  latestTurn = turn;

  const btn = document.querySelector(".controls button");
  if (!myPlayer) {
    btn.disabled = true;
  } else {
    btn.disabled = (turn !== myPlayer);
  }

  document.getElementById("playerLabel").textContent =
    myPlayer
      ? `당신은 Player ${myPlayer} ${myPlayer === 1 ? "🐶" : "😎"} / 현재 턴: Player ${turn}`
      : `관전 모드 👀 / 현재 턴: Player ${turn}`;
});

window.rollDice = async function () {
  if (!latestTurn) return; // 안전장치
  if (!myPlayer) return;
  if (latestTurn !== myPlayer) return; // 내 턴 아니면 무시

  const dice = Math.floor(Math.random() * 6) + 1;
  document.getElementById("diceResult").innerText = dice;

  const myPos = (myPlayer === 1) ? currentPos : currentPos2;
  const next = (myPos + dice) % 16;

  // ✅ 내 말 이동 + 턴 넘기기
  await setDoc(gameRef, {
    ...(myPlayer === 1 ? { position1: next } : { position2: next }),
    turn: (myPlayer === 1 ? 2 : 1)
  }, { merge: true });
};
  }

  // 모바일에서 DOM 준비 보장
  window.addEventListener("DOMContentLoaded", () => {
    main().catch((e) => {
      console.error(e);
      document.body.insertAdjacentHTML(
        "beforeend",
        `<p style="color:#b00020;font-weight:700">에러: ${String(e.message || e)}</p>`
      );
    });
  });

function renderTokens(p1, p2) {
  // 기존 토큰들 제거
  document.querySelectorAll(".token").forEach(el => el.remove());

  // 🐶 Player1
  const c1 = document.getElementById(`tile-${p1}`);
  if (c1) {
    const t1 = document.createElement("div");
    t1.className = "token p1";
    t1.textContent = "🐶";
    c1.appendChild(t1);
  }

  // 😎 Player2
  const c2 = document.getElementById(`tile-${p2}`);
  if (c2) {
    const t2 = document.createElement("div");
    t2.className = "token p2";
    t2.textContent = "😎";
    c2.appendChild(t2);
  }
}
</script>

  <style>
    body { background: #ffe6f2; font-family: sans-serif; text-align: center; }
#board{
  display:grid;
  grid-template-columns: repeat(5, 72px); /* 크기 조절 가능 */
  gap: 10px;
  justify-content:center;
  margin-top:20px;
}

.cell, .empty{
  width:72px;
  height:72px;
  border-radius:14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  box-sizing:border-box;
}

.cell{
  background:white;
}
.cell.corner{
  transform: scale(1.18);
  transform-origin: center;
  z-index: 2;
  outline: 4px solid #ff2f92;
  outline-offset: -4px;
}
.empty{
  background:transparent;
  border:none;
}
.tileName{
  font-weight:800;
  font-size:12px;
  line-height:1.1;
  text-align:center;
  padding:0 4px;
  word-break:keep-all;   /* 한글 글자 단위 쪼개짐 방지 */
}

.tileAmt{
  margin-top:6px;
  font-size:11px;
  opacity:0.75;
  text-align:center;
  padding:0 4px;
  word-break:keep-all;
}
    
.cell{
  position: relative; /* 말 올리려면 필수 */
}

.token{
  position: absolute;
  bottom: 8px;
  font-size: 18px;
  line-height: 1;
  pointer-events: none;
}

.token.p1{ left: 8px; }   /* 🐶 왼쪽 아래 */
.token.p2{ right: 8px; }  /* 😎 오른쪽 아래 */

.controls{
    margin-top: 28px;   /* 보드와 거리 */
  }

.controls button{
    padding: 10px 16px;
    border: none;
    border-radius: 12px;
    background: #ff5aa5;
    color: white;
    font-weight: 700;
    cursor: pointer;
  }

.controls button:active{
    transform: scale(0.98);
  }
  </style>
</head>
<body>
  <h1>Yuri Marble 💗</h1>

  <p id="playerLabel" style="font-weight:800;margin:6px 0 0;"></p>
  
  <div id="board"></div>

<div class="controls">
  <button onclick="rollDice()">🎲 주사위</button>
  <p>주사위 결과: <span id="diceResult">-</span></p>
</div>
</body>
</html>
