<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yuri Marble 💗</title>

  <style>
    body { background: #ffe6f2; font-family: sans-serif; text-align: center; margin: 0; padding: 18px; }
    h1 { margin: 8px 0 10px; }

    #playerLabel{ font-weight:800; margin:6px 0 0; }
    #moneyDisplay{ font-weight:700; margin:6px 0 0; }

    #board{
      display:grid;
      grid-template-columns: repeat(5, 72px);
      gap: 10px;
      justify-content:center;
      margin-top:14px;
    }

    .cell, .empty{
      width:72px;
      height:72px;
      border-radius:14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      box-sizing:border-box;
    }

    .cell{
      background:white;
      position: relative;
      box-shadow: 0 8px 18px rgba(0,0,0,0.06);
    }

    .cell.corner{
      transform: scale(1.18);
      transform-origin: center;
      z-index: 2;
      outline: 4px solid #ff2f92;
      outline-offset: -4px;
    }

    .empty{ background:transparent; border:none; }

    .tileName{
      font-weight:900;
      font-size:12px;
      line-height:1.1;
      text-align:center;
      padding:0 4px;
      word-break:keep-all;
    }

    .tileAmt{
      margin-top:6px;
      font-size:11px;
      opacity:0.75;
      text-align:center;
      padding:0 4px;
      word-break:keep-all;
    }

    .token{
      position: absolute;
      bottom: 8px;
      font-size: 18px;
      line-height: 1;
      pointer-events: none;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.12));
    }
    .token.p1{ left: 8px; }
    .token.p2{ right: 8px; }

    .controls{ margin-top: 18px; }
    .controls button{
      padding: 10px 16px;
      border: none;
      border-radius: 12px;
      background: #ff5aa5;
      color: white;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(255,90,165,0.25);
    }
    .controls button:disabled{
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }
    .controls button:active{ transform: scale(0.98); }

    #diceBox{
      display:flex;
      justify-content:center;
      align-items:center;
      gap: 10px;
      margin-top: 10px;
      font-weight: 900;
    }
    #dice{
      width: 46px; height: 46px;
      border-radius: 14px;
      background: #fff;
      display:flex; justify-content:center; align-items:center;
      font-size: 22px;
      box-shadow: 0 10px 18px rgba(0,0,0,0.08);
      user-select:none;
    }
    #dice.shake { animation: shake 0.35s linear 2; }
    @keyframes shake{
      0%{ transform: rotate(0deg) translateX(0); }
      25%{ transform: rotate(-8deg) translateX(-2px); }
      50%{ transform: rotate(8deg) translateX(2px); }
      75%{ transform: rotate(-6deg) translateX(-2px); }
      100%{ transform: rotate(0deg) translateX(0); }
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const firebaseConfig = {
  apiKey: "AIzaSyB-ZXl5RpgKzbickK0VJrFFY1YJ0U3qp0A",
  authDomain: "yuri-marble.firebaseapp.com",
  projectId: "yuri-marble",
  storageBucket: "yuri-marble.firebasestorage.app",
  messagingSenderId: "520132626186",
  appId: "1:520132626186:web:9997ba54d5c0364a799cf3"
};

    // 타일(표시용)
    const tiles = {
  0:  { type:"start",  name: "출발 💗", amount: "+20" },

  1:  { type:"prop",   name: "스위스 ❄️", price: 10, rent: 4 },
  2:  { type:"key",    name: "황금열쇠 🔑" },
  3:  { type:"prop",   name: "프랑스 🥐", price: 20, rent: 6 },
  4:  { type:"jail",   name: "무인도 🏝", amount: "2턴 정지" },

  5:  { type:"prop",   name: "일본 🗾", price: 30, rent: 8 },
  6:  { type:"key",    name: "황금열쇠 🔑" },
  7:  { type:"prop",   name: "미국 🗽", price: 40, rent: 10 },
  8:  { type:"fund",   name: "사회복지기금 💰", amount: "모인 금액 수령" },

  9:  { type:"prop",   name: "독일 🍺", price: 50, rent: 12 },
  10: { type:"key",    name: "황금열쇠 🔑" },
  11: { type:"prop",   name: "태국 🌴", price: 60, rent: 14 },
  12: { type:"travel", name: "우주여행 🚀", amount: "랜덤 이동" },

  13: { type:"prop",   name: "영국 ☕", price: 70, rent: 16 },
  14: { type:"fundpay",name: "사회복지기금 접수처 🧾", amount: "-10 기부" },
  15: { type:"prop",   name: "서울 🏙", price: 80, rent: 18 }
};

    const layout = [
      8,  9, 10, 11, 12,
      7, null, null, null, 13,
      6, null, null, null, 14,
      5, null, null, null, 15,
      4,  3,  2,  1,  0
    ];

    function renderTokens(p1, p2) {
      document.querySelectorAll(".token").forEach(el => el.remove());

      const c1 = document.getElementById(`tile-${p1}`);
      if (c1) {
        const t1 = document.createElement("div");
        t1.className = "token p1";
        t1.textContent = "🐶";
        c1.appendChild(t1);
      }

      const c2 = document.getElementById(`tile-${p2}`);
      if (c2) {
        const t2 = document.createElement("div");
        t2.className = "token p2";
        t2.textContent = "😎";
        c2.appendChild(t2);
      }
    }

    async function main() {
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);
      await signInAnonymously(auth);

      // 보드 그리기
      const boardEl = document.getElementById("board");
      boardEl.innerHTML = "";
      layout.forEach((num) => {
        const cell = document.createElement("div");
        if (num === null) {
          cell.className = "empty";
          cell.innerHTML = "&nbsp;";
        } else {
          cell.className = "cell";
          cell.id = `tile-${num}`;
          if ([0,4,8,12].includes(num)) cell.classList.add("corner");
          const t = tiles[num];
          cell.innerHTML = `
            <div class="tileName">${t?.name ?? num}</div>
            <div class="tileAmt">${t?.amount ?? ""}</div>
          `;
        }
        boardEl.appendChild(cell);
      });

      // 게임 상태/로컬 변수
      const gameRef = doc(db, "games", "room1");
      let myPlayer = null;
      let currentPos = 0;
      let currentPos2 = 0;
      let latestTurn = 1;
      let money1 = 200;
      let money2 = 200;

      // 이동 애니메이션
      let animating = false;
      const sleep = (ms) => new Promise(r => setTimeout(r, ms));
      async function animateMove(who, from, to){
        if (animating) return;
        animating = true;
        let pos = from;
        const steps = (to - from + 16) % 16;
        for (let i=0; i<steps; i++){
          pos = (pos + 1) % 16;
          if (who === 1) currentPos = pos; else currentPos2 = pos;
          renderTokens(currentPos, currentPos2);
          await sleep(180);
        }
        animating = false;
      }

      // 초기값: position만 기본 보장
      await setDoc(gameRef, { position1: 0, position2: 0 }, { merge: true });

      // turn/money가 없을 때만 초기 세팅
      await runTransaction(db, async (tx) => {
        const snap = await tx.get(gameRef);
        const data = snap.data() || {};
        const patch = {};
        if (data.turn == null) patch.turn = 1;
        if (data.money1 == null) patch.money1 = 200;
        if (data.money2 == null) patch.money2 = 200;
        if (Object.keys(patch).length) tx.set(gameRef, patch, { merge: true });
      });

      // 자동 좌석 배정
      const uid = auth.currentUser.uid;
      async function assignPlayer() {
        const saved = localStorage.getItem("yuriMarblePlayer");
        if (saved === "1" || saved === "2") { myPlayer = Number(saved); return; }

        await runTransaction(db, async (tx) => {
          const snap = await tx.get(gameRef);
          const data = snap.exists() ? snap.data() : {};
          const seat1 = data.seat1 ?? null;
          const seat2 = data.seat2 ?? null;

          if (seat1 === uid) myPlayer = 1;
          else if (seat2 === uid) myPlayer = 2;
          else if (!seat1) { myPlayer = 1; tx.set(gameRef, { seat1: uid }, { merge: true }); }
          else if (!seat2) { myPlayer = 2; tx.set(gameRef, { seat2: uid }, { merge: true }); }
          else myPlayer = null;
        });

        if (myPlayer) localStorage.setItem("yuriMarblePlayer", String(myPlayer));
      }
      await assignPlayer();

      // 주사위 굴리기(턴/실시간)
      window.rollDice = async function () {
        if (!myPlayer) return;
        if (animating) return;

        // 주사위 흔들림
        const diceEl = document.getElementById("dice");
        diceEl.classList.add("shake");
        document.getElementById("diceResult").innerText = "...";
        diceEl.textContent = "🎲";
        await sleep(650);
        diceEl.classList.remove("shake");

        const dice = Math.floor(Math.random() * 6) + 1;
        document.getElementById("diceResult").innerText = dice;
        diceEl.textContent = dice;

        await runTransaction(db, async (tx) => {
          const snap = await tx.get(gameRef);
          const data = snap.data() || {};
          const turn = data.turn ?? 1;
          if (turn !== myPlayer) return;

          const pos1 = data.position1 ?? 0;
          const pos2 = data.position2 ?? 0;
          const myPos = (myPlayer === 1) ? pos1 : pos2;
          const next = (myPos + dice) % 16;

          tx.set(gameRef, {
            ...(myPlayer === 1 ? { position1: next } : { position2: next }),
            turn: (myPlayer === 1 ? 2 : 1)
          }, { merge: true });
        });
      };

      // 실시간 렌더
      onSnapshot(gameRef, async (snap) => {
        const data = snap.data() || {};
        money1 = data.money1 ?? 200;
        money2 = data.money2 ?? 200;

        const newP1 = data.position1 ?? 0;
        const newP2 = data.position2 ?? 0;

        if (newP1 !== currentPos) await animateMove(1, currentPos, newP1);
        else currentPos = newP1;

        if (newP2 !== currentPos2) await animateMove(2, currentPos2, newP2);
        else currentPos2 = newP2;

        renderTokens(currentPos, currentPos2);

        const turn = data.turn ?? 1;
        latestTurn = turn;

        const btn = document.getElementById("rollBtn");
        btn.disabled = (!myPlayer || latestTurn !== myPlayer || animating);

        document.getElementById("playerLabel").textContent =
          myPlayer
            ? `당신은 Player ${myPlayer} ${myPlayer === 1 ? "🐶" : "😎"} / 현재 턴: Player ${turn}`
            : `관전 모드 👀 / 현재 턴: Player ${turn}`;

document.getElementById("moneyDisplay").innerHTML =
  `Player 1: <b>${money1}</b> 💰 &nbsp;&nbsp; | &nbsp;&nbsp; Player 2: <b>${money2}</b> 💰`;
      });
    }

    window.addEventListener("DOMContentLoaded", () => {
      main().catch((e) => {
        console.error(e);
        document.body.insertAdjacentHTML(
          "beforeend",
          `<p style="color:#b00020;font-weight:700">에러: ${String(e.message || e)}</p>`
        );
      });
    });
  </script>
</head>
<body>
  <h1>Yuri Marble 💗</h1>
  <p id="playerLabel"></p>
  <p id="moneyDisplay"></p>

  <div id="board"></div>

  <div class="controls">
    <button id="rollBtn" onclick="rollDice()">🎲 주사위</button>

    <div id="diceBox">
      <div id="dice">🎲</div>
      <div>결과: <span id="diceResult">-</span></div>
    </div>
  </div>
</body>
</html>
