<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Yuri Marble 💗</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB-ZXl5RpgKzbickK0VJrFFY1YJ0U3qp0A",
      authDomain: "yuri-marble.firebaseapp.com",
      projectId: "yuri-marble",
      storageBucket: "yuri-marble.firebasestorage.app",
      messagingSenderId: "520132626186",
      appId: "1:520132626186:web:9997ba54d5c0364a799cf3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    await signInAnonymously(auth);

    const gameRef = doc(db, "games", "room1");

    const board = document.getElementById("board");

const layout = [
  0, 1, 2, 3, 4,
  15, null, null, null, 5,
  14, null, null, null, 6,
  13, null, null, null, 7,
  12, 11, 10, 9, 8
];

layout.forEach((num) => {
  const cell = document.createElement("div");
  if (num === null) {
    cell.className = "empty";
  } else {
    cell.className = "cell";
    cell.innerText = num;
  }
  board.appendChild(cell);
});
    }

    await setDoc(gameRef, { position1: 0, position2: 0 });

    onSnapshot(gameRef, (doc) => {
      const data = doc.data();
      document.getElementById("p1").innerText = data.position1;
      document.getElementById("p2").innerText = data.position2;
    });

    window.move = async function(player) {
      const snapshot = await gameRef.get();
    };
  </script>

  <style>
    body { background: #ffe6f2; font-family: sans-serif; text-align: center; }
    #board { 
      display: grid; 
      grid-template-columns: repeat(5, 60px); 
      gap: 5px; 
      justify-content: center; 
      margin-top: 20px;
    }
    .cell { 
      background: white; 
      border-radius: 10px; 
      padding: 20px; 
    }
.empty {
  background: transparent;
  border: none;
}
  </style>
</head>
<body>
  <h1>Yuri Marble 💗</h1>
  <div id="board"></div>
  <p>Player1 위치: <span id="p1">0</span></p>
  <p>Player2 위치: <span id="p2">0</span></p>
</body>
</html>
