<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yuri Marble 💗</title>

  <style>
    body { background: #ffe6f2; font-family: sans-serif; text-align: center; margin: 0; padding: 18px; }
    h1 { margin: 8px 0 10px; }

    #playerLabel{ font-weight:800; margin:6px 0 0; }
    #moneyDisplay{ font-weight:700; margin:6px 0 0; }

    #board{
      display:grid;
      grid-template-columns: repeat(5, 72px);
      gap: 10px;
      justify-content:center;
      margin-top:14px;
    }

    .cell, .empty{
      width:72px;
      height:72px;
      border-radius:14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      box-sizing:border-box;
    }

    .cell{
      background:white;
      position: relative;
      box-shadow: 0 8px 18px rgba(0,0,0,0.06);
    }

    .cell.corner{
      transform: scale(1.18);
      transform-origin: center;
      z-index: 2;
      outline: 4px solid #ff2f92;
      outline-offset: -4px;
    }

    .empty{ background:transparent; border:none; }

    .tileName{
      font-weight:900;
      font-size:12px;
      line-height:1.1;
      text-align:center;
      padding:0 4px;
      word-break:keep-all;
    }

    .tileAmt{
      margin-top:6px;
      font-size:11px;
      opacity:0.75;
      text-align:center;
      padding:0 4px;
      word-break:keep-all;
    }

    .token{
      position: absolute;
      bottom: 8px;
      font-size: 18px;
      line-height: 1;
      pointer-events: none;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.12));
    }
    .token.p1{ left: 8px; }
    .token.p2{ right: 8px; }

    .controls{ margin-top: 18px; }
    .controls button{
      padding: 10px 16px;
      border: none;
      border-radius: 12px;
      background: #ff5aa5;
      color: white;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(255,90,165,0.25);
    }
    .controls button:disabled{
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }
    .controls button:active{ transform: scale(0.98); }

    #diceBox{
      display:flex;
      justify-content:center;
      align-items:center;
      gap: 10px;
      margin-top: 10px;
      font-weight: 900;
    }
    #dice{
      width: 46px; height: 46px;
      border-radius: 14px;
      background: #fff;
      display:flex; justify-content:center; align-items:center;
      font-size: 22px;
      box-shadow: 0 10px 18px rgba(0,0,0,0.08);
      user-select:none;
    }
    #dice.shake { animation: shake 0.35s linear 2; }
    @keyframes shake{
      0%{ transform: rotate(0deg) translateX(0); }
      25%{ transform: rotate(-8deg) translateX(-2px); }
      50%{ transform: rotate(8deg) translateX(2px); }
      75%{ transform: rotate(-6deg) translateX(-2px); }
      100%{ transform: rotate(0deg) translateX(0); }
    }

    #modalBackdrop{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  display:none;
  align-items:center;
  justify-content:center;
  z-index: 999;
}
#modal{
  width: min(360px, calc(100vw - 40px));
  background: #fff;
  border-radius: 18px;
  padding: 16px 16px 14px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.18);
  text-align:left;
}
#modal h3{
  margin: 0 0 6px;
  font-size: 16px;
}
#modal .sub{
  margin: 0 0 12px;
  font-size: 13px;
  opacity: 0.8;
  line-height: 1.35;
}
#modal .actions{
  display:flex;
  gap:10px;
  justify-content:flex-end;
}
#modal .actions button{
  padding: 10px 14px;
  border-radius: 12px;
  font-weight: 900;
  border: none;
  cursor: pointer;
}
#buyBtn{ background:#ff5aa5; color:#fff; }
#passBtn{ background:#f2f2f2; }
#toast{
  position: fixed;
  left: 50%;
  bottom: 18px;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.78);
  color:#fff;
  padding: 10px 12px;
  border-radius: 12px;
  font-weight: 800;
  display:none;
  z-index: 1000;
  max-width: calc(100vw - 40px);
}

  .owner1 {
  background-color: #f3c1ca;  /* 애쉬핑크 */
  color: #1f1f1f;
}

.owner2 {
  background-color: #c7e6ff;  /* 베이비블루 */
  color: #1f1f1f;
}  
    
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const firebaseConfig = {
  apiKey: "AIzaSyB-ZXl5RpgKzbickK0VJrFFY1YJ0U3qp0A",
  authDomain: "yuri-marble.firebaseapp.com",
  projectId: "yuri-marble",
  storageBucket: "yuri-marble.firebasestorage.app",
  messagingSenderId: "520132626186",
  appId: "1:520132626186:web:9997ba54d5c0364a799cf3"
};

    // 타일(표시용)
    const tiles = {
  0:  { type:"start",  name: "출발 💗", amount: "+20" },

  1:  { type:"prop",   name: "스위스 ❄️", price: 10, rent: 4 },
  2:  { type:"key",    name: "황금열쇠 🔑" },
  3:  { type:"prop",   name: "프랑스 🥐", price: 20, rent: 6 },
  4:  { type:"jail",   name: "무인도 🏝", amount: "2턴 정지" },

  5:  { type:"prop",   name: "일본 🗾", price: 30, rent: 8 },
  6:  { type:"key",    name: "황금열쇠 🔑" },
  7:  { type:"prop",   name: "미국 🗽", price: 40, rent: 10 },
  8:  { type:"fund",   name: "사회복지기금 💰", amount: "모인 금액 수령" },

  9:  { type:"prop",   name: "독일 🍺", price: 50, rent: 12 },
  10: { type:"key",    name: "황금열쇠 🔑" },
  11: { type:"prop",   name: "태국 🌴", price: 60, rent: 14 },
  12: { type:"travel", name: "우주여행 🚀", amount: "랜덤 이동" },

  13: { type:"prop",   name: "영국 ☕", price: 70, rent: 16 },
  14: { type:"fundpay",name: "사회복지기금 접수처 🧾", amount: "-10 기부" },
  15: { type:"prop",   name: "서울 🏙", price: 80, rent: 18 }
};

    const layout = [
      8,  9, 10, 11, 12,
      7, null, null, null, 13,
      6, null, null, null, 14,
      5, null, null, null, 15,
      4,  3,  2,  1,  0
    ];

    function renderTokens(p1, p2) {
      document.querySelectorAll(".token").forEach(el => el.remove());

      const c1 = document.getElementById(`tile-${p1}`);
      if (c1) {
        const t1 = document.createElement("div");
        t1.className = "token p1";
        t1.textContent = "🐶";
        c1.appendChild(t1);
      }

      const c2 = document.getElementById(`tile-${p2}`);
      if (c2) {
        const t2 = document.createElement("div");
        t2.className = "token p2";
        t2.textContent = "😎";
        c2.appendChild(t2);
      }
    }

      let owned = {};
      let pending = null;

const ROOM_ID = "room1";
const CLIENT_ID_KEY = `yuriMarble:${ROOM_ID}:clientId`;

const clientId = localStorage.getItem(CLIENT_ID_KEY) || (() => {
  const id = (crypto?.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random());
  localStorage.setItem(CLIENT_ID_KEY, id);
  return id;
})();

const SEAT_TIMEOUT_MS = 15000;    
    
    async function main() {
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);
      await signInAnonymously(auth);

// 보드 그리기
const boardEl = document.getElementById("board");
boardEl.innerHTML = "";

layout.forEach((num) => {
  const cell = document.createElement("div");

  if (num === null) {
    cell.className = "empty";
    cell.innerHTML = "&nbsp;";
  } else {
    cell.className = "cell";
    cell.id = `tile-${num}`;
    if ([0, 4, 8, 12].includes(num)) cell.classList.add("corner");

const t = tiles[num];

// ✅ prop(땅)이면 price 표시, 아니면 amount 표시
const amtText =
  (t?.type === "prop")
    ? `${t.price}`
    : (t?.amount ?? "");

cell.innerHTML = `
  <div class="tileName">${t?.name ?? num}</div>
  <div class="tileAmt">${amtText}</div>
`;

    // ✅ 소유 색 적용
    const owner = owned?.[String(num)] ?? null;
    cell.classList.remove("owner1", "owner2");
    if (owner === 1) cell.classList.add("owner1");
    if (owner === 2) cell.classList.add("owner2");
  }

  boardEl.appendChild(cell);
});

      // 게임 상태/로컬 변수
      const gameRef = doc(db, "games", "room1");

   async function claimSeat() {
  await runTransaction(db, async (tx) => {
    const snap = await tx.get(gameRef);
    const data = snap.data() || {};
    const now = Date.now();

    const p1 = data.player1Id ?? null;
    const p2 = data.player2Id ?? null;
    const p1Seen = data.p1LastSeen ?? 0;
    const p2Seen = data.p2LastSeen ?? 0;

    const p1Alive = p1 && (now - p1Seen) < SEAT_TIMEOUT_MS;
    const p2Alive = p2 && (now - p2Seen) < SEAT_TIMEOUT_MS;

    // 내가 이미 자리면 lastSeen만 갱신
    if (p1 === clientId) {
      tx.set(gameRef, { p1LastSeen: now }, { merge: true });
      return;
    }
    if (p2 === clientId) {
      tx.set(gameRef, { p2LastSeen: now }, { merge: true });
      return;
    }

    // 1P가 비었거나 죽었으면 내가 1P
    if (!p1 || !p1Alive) {
      tx.set(gameRef, { player1Id: clientId, p1LastSeen: now }, { merge: true });
      return;
    }

    // 2P가 비었거나 죽었으면 내가 2P
    if (!p2 || !p2Alive) {
      tx.set(gameRef, { player2Id: clientId, p2LastSeen: now }, { merge: true });
      return;
    }

    // 둘 다 살아있으면 관전(아무것도 안 함)
  });
}   

      window.resetGame = async function () {
  await setDoc(gameRef, {
    position1: 0,
    position2: 0,
    turn: 1,
    money1: 200,
    money2: 200,
    owned: {},
    pending: null
  }, { merge: true });
};
      
      let myPlayer = null;
      let currentPos = 0;
      let currentPos2 = 0;
      let latestTurn = 1;
      let money1 = 200;
      let money2 = 200;
      
function showToast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.display = "block";
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(() => (el.style.display="none"), 1400);
}

function openBuyModal(tileNum){
  const t = tiles[tileNum];
  const price = t?.price ?? 0;

  document.getElementById("modalTitle").textContent =
    `땅 구매: ${t?.name ?? tileNum}`;

  document.getElementById("modalDesc").innerHTML =
    `가격: <b>${price}</b> 💰<br/>구매하시겠어요?`;

  document.getElementById("modalBackdrop").style.display = "flex";
}

function closeBuyModal(){
  document.getElementById("modalBackdrop").style.display = "none";
}

window.confirmBuy = async function(){
  await resolvePending("buy");
};

window.passBuy = async function(){
  await resolvePending("pass");
};

async function resolvePending(action){
  if (!myPlayer) return;

  await runTransaction(db, async (tx) => {
    const snap = await tx.get(gameRef);
    const data = snap.data() || {};
    const p = data.pending || null;
    if (!p) return;
    if (p.type !== "buy") return;
    if (p.player !== myPlayer) return;

    const tile = p.tile;
    const t = tiles[tile];
    if (t?.type !== "prop") {
      tx.set(gameRef, { pending: null }, { merge: true });
      return;
    }

    const ownedNow = data.owned || {};
    const already = ownedNow[String(tile)] ?? null;

    // 이미 다른 사람이 소유했으면 그냥 종료
    if (already) {
      tx.set(gameRef, {
        pending: null,
        turn: (myPlayer === 1 ? 2 : 1)
      }, { merge: true });
      return;
    }

    if (action === "buy"){
      const price = t.price ?? 0;
      const m1 = data.money1 ?? 200;
      const m2 = data.money2 ?? 200;
      const myMoney = (myPlayer === 1) ? m1 : m2;

      if (myMoney < price) {
        // 돈 부족 -> 그냥 패스
        tx.set(gameRef, {
          pending: null,
          turn: (myPlayer === 1 ? 2 : 1)
        }, { merge: true });
        return;
      }

      ownedNow[String(tile)] = myPlayer;

      const patchMoney = (myPlayer === 1)
        ? { money1: myMoney - price }
        : { money2: myMoney - price };

      tx.set(gameRef, {
        owned: ownedNow,
        ...patchMoney,
        pending: null,
        turn: (myPlayer === 1 ? 2 : 1)
      }, { merge: true });

    } else {
      // 패스
      tx.set(gameRef, {
        pending: null,
        turn: (myPlayer === 1 ? 2 : 1)
      }, { merge: true });
    }
  });
}
      // 이동 애니메이션
      let animating = false;
      const sleep = (ms) => new Promise(r => setTimeout(r, ms));
      async function animateMove(who, from, to){
        if (animating) return;
        animating = true;
        let pos = from;
        const steps = (to - from + 16) % 16;

        for (let i=0; i<steps; i++){
          pos = (pos + 1) % 16;
          if (who === 1) currentPos = pos; else currentPos2 = pos;
          renderTokens(currentPos, currentPos2);
          await sleep(180);
        }
        animating = false;
      }

      // 초기값: position만 기본 보장
      await setDoc(gameRef, { position1: 0, position2: 0 }, { merge: true });

      // turn/money가 없을 때만 초기 세팅
      await runTransaction(db, async (tx) => {
        const snap = await tx.get(gameRef);
        const data = snap.data() || {};
        owned = data.owned || {};
        const patch = {};
        if (data.turn == null) patch.turn = 1;
        if (data.money1 == null) patch.money1 = 200;
        if (data.money2 == null) patch.money2 = 200;
        if (Object.keys(patch).length) tx.set(gameRef, patch, { merge: true });
      });

      // 자동 좌석 배정
      const uid = auth.currentUser.uid;
      async function assignPlayer() {
        const saved = localStorage.getItem("yuriMarblePlayer");
        if (saved === "1" || saved === "2") { myPlayer = Number(saved); return; }

        await runTransaction(db, async (tx) => {
          const snap = await tx.get(gameRef);
          const data = snap.exists() ? snap.data() : {};
          const seat1 = data.seat1 ?? null;
          const seat2 = data.seat2 ?? null;

          if (seat1 === uid) myPlayer = 1;
          else if (seat2 === uid) myPlayer = 2;
          else if (!seat1) { myPlayer = 1; tx.set(gameRef, { seat1: uid }, { merge: true }); }
          else if (!seat2) { myPlayer = 2; tx.set(gameRef, { seat2: uid }, { merge: true }); }
          else myPlayer = null;
        });

        if (myPlayer) localStorage.setItem("yuriMarblePlayer", String(myPlayer));
      }
      await assignPlayer();

      // 주사위 굴리기(턴/실시간)
      window.rollDice = async function () {
        if (!myPlayer) return;
        if (animating) return;

        // 주사위 흔들림
        const diceEl = document.getElementById("dice");
        diceEl.classList.add("shake");
        document.getElementById("diceResult").innerText = "...";
        diceEl.textContent = "🎲";
        await sleep(650);
        diceEl.classList.remove("shake");

        const dice = Math.floor(Math.random() * 6) + 1;
        document.getElementById("diceResult").innerText = dice;
        diceEl.textContent = dice;

        await runTransaction(db, async (tx) => {
          const snap = await tx.get(gameRef);
          const data = snap.data() || {};
          const turn = data.turn ?? 1;
          if (turn !== myPlayer) return;

          const pos1 = data.position1 ?? 0;
          const pos2 = data.position2 ?? 0;
          const myPos = (myPlayer === 1) ? pos1 : pos2;
          const next = (myPos + dice) % 16;

const ownedNow = data.owned || {};
const t = tiles[next];
const isProp = t?.type === "prop";
const owner = ownedNow[String(next)] ?? null;

// 1) 이동은 항상 반영
const movePatch = (myPlayer === 1) ? { position1: next } : { position2: next };

// 2) 무소유 땅이면: pending 생성(턴은 아직 안 넘김)
if (isProp && !owner) {
  tx.set(gameRef, {
    ...movePatch,
    owned: ownedNow,
    pending: {
      type: "buy",
      tile: next,
      player: myPlayer,
      price: t.price ?? 0
    }
  }, { merge: true });
  return;
}

// 3) 이미 소유거나 땅이 아니면: 그냥 턴 넘김
tx.set(gameRef, {
  ...movePatch,
  owned: ownedNow,
  turn: (myPlayer === 1 ? 2 : 1)
}, { merge: true });
        });
      };

await claimSeat();

      setInterval(async () => {
  try {
    await runTransaction(db, async (tx) => {
      const snap = await tx.get(gameRef);
      const data = snap.data() || {};
      const now = Date.now();

      if (data.player1Id === clientId) {
        tx.set(gameRef, { p1LastSeen: now }, { merge: true });
      }

      if (data.player2Id === clientId) {
        tx.set(gameRef, { p2LastSeen: now }, { merge: true });
      }
    });
  } catch (e) {
    // 네트워크 오류 무시
  }
}, 5000);
      
      onSnapshot(gameRef, async (snap) => {
        const data = snap.data() || {};
        
        const p1 = data.player1Id ?? null;
const p2 = data.player2Id ?? null;
myPlayer = (p1 === clientId) ? 1 : (p2 === clientId) ? 2 : null;

 document.getElementById("playerLabel").textContent =
    myPlayer ? `You are Player ${myPlayer}` : "관전모드";
        
        money1 = data.money1 ?? 200;
        money2 = data.money2 ?? 200;
        owned = data.owned || {};
pending = data.pending || null;

        const newP1 = data.position1 ?? 0;
        const newP2 = data.position2 ?? 0;

        if (newP1 !== currentPos) await animateMove(1, currentPos, newP1);
        else currentPos = newP1;

        if (newP2 !== currentPos2) await animateMove(2, currentPos2, newP2);
        else currentPos2 = newP2;

        renderTokens(currentPos, currentPos2);

        const turn = data.turn ?? 1;
        latestTurn = turn;

        const btn = document.getElementById("rollBtn");
btn.disabled = (!myPlayer || latestTurn !== myPlayer || animating || !!pending);

        document.getElementById("playerLabel").textContent =
          myPlayer
            ? `당신은 Player ${myPlayer} ${myPlayer === 1 ? "🐶" : "😎"} / 현재 턴: Player ${turn}`
            : `관전 모드 👀 / 현재 턴: Player ${turn}`;

document.getElementById("moneyDisplay").innerHTML =
  `Player 1: <b>${money1}</b> 💰 &nbsp;&nbsp; | &nbsp;&nbsp; Player 2: <b>${money2}</b> 💰`;

        if (pending && pending.type === "buy") {
  if (myPlayer && pending.player === myPlayer) {
    openBuyModal(pending.tile);
  } else {
    closeBuyModal();
  }
} else {
  closeBuyModal();
}
  if (!pending && myPlayer) {
  const myPosNow = (myPlayer === 1) ? (data.position1 ?? 0) : (data.position2 ?? 0);
  const t = tiles[myPosNow];
  if (t?.type === "prop") {
    const ownerNow = owned[String(myPosNow)] ?? null;
    if (ownerNow && ownerNow !== myPlayer) {
      showToast("이미 누군가 소유한 땅이라 구매할 수 없어요!");
    }
  }
}      
      });     
    }

    window.addEventListener("DOMContentLoaded", () => {
      main().catch((e) => {
        console.error(e);
        document.body.insertAdjacentHTML(
          "beforeend",
          `<p style="color:#b00020;font-weight:700">에러: ${String(e.message || e)}</p>`
        );
      });
    });
  </script>
</head>
<body>
  <h1>Yuri Marble 💗</h1>
  <p id="playerLabel"></p>
  <p id="moneyDisplay"></p>

  <div id="board"></div>

  <div class="controls">
    <button id="rollBtn" onclick="rollDice()">🎲 주사위</button>
      <button onclick="resetGame()">🔄 게임 리셋</button>

    <div id="diceBox">
      <div id="dice">🎲</div>
      <div>결과: <span id="diceResult">-</span></div>
    </div>
  </div>
  
<div id="modalBackdrop">
  <div id="modal">
    <h3 id="modalTitle">땅 구매</h3>
    <p class="sub" id="modalDesc">-</p>
    <div class="actions">
      <button id="passBtn" onclick="passBuy()">패스</button>
      <button id="buyBtn" onclick="confirmBuy()">구매</button>
    </div>
  </div>
</div>

<div id="toast"></div>
  
</body>
</html>
